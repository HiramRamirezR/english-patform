<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo | Moonsforest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mapa.css">
</head>

<body>
    <!-- Header Modular -->
    <div id="main-header"></div>

    <div class="dashboard-container" id="dashboard-content"
        style="max-width: 800px; padding: 2rem 1rem; margin: 0 auto; overflow: visible;">

        <header class="stats-header"
            style="justify-content: space-between; gap: 1rem; margin-bottom: 2rem; position: relative; top: 0;">
            <button class="btn btn-secondary" onclick="window.location.href='mapa.html'"
                style="padding: 0.5rem 1rem; font-size: 0.9rem;">← Volver</button>
            <h2 style="font-size: 1.25rem; color: var(--primary-deep); margin: 0; flex: 1; text-align: center;"
                id="module-title">Cargando Módulo...</h2>
            <div style="width: 80px;"></div> <!-- Spacing balance -->
        </header>

        <p style="text-align: center; color: var(--slate-600); margin-bottom: 2rem;" id="module-desc">Por favor espera
            un momento.</p>

        <!-- The Peak Map (generado dinámicamente) -->
        <main class="peak-map" id="map-path"
            style="flex-direction: column; overflow-x: hidden; padding-top: 0; max-width: 600px; margin: 0 auto;">
            <!-- Contenido inyectado por JS -->
        </main>

    </div>

    <!-- Scripts -->
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/components/header.js"></script>
    <script type="module" src="/js/moduleLoader.js"></script>
</body>

</html>
