<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | English Forest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <header class="stats-header">
            <div class="user-profile">
                <div class="user-avatar">🦊</div>
                <div>
                    <h3 id="user-name" style="font-size: 1rem;">¡Hola, Explorador!</h3>
                    <p style="font-size: 0.7rem; color: var(--slate-500);">Nivel 1 - Bosque de Inicio</p>
                </div>
            </div>
            <div class="points-badge">
                🌟 <span id="user-points">0</span> pts
            </div>
        </header>

        <!-- The Forest Map -->
        <main class="forest-map" id="map-path">
            <!-- First Module Unlocked -->
            <div class="module-node unlocked" onclick="startModule(1)">
                <span class="module-icon">🌳</span>
                <span class="module-label">Módulo 1: El Inicio</span>
            </div>

            <!-- Locked Modules -->
            <div class="module-node locked">
                <span class="module-icon">🦉</span>
                <span class="module-label">Módulo 2: Sonidos</span>
            </div>
            <div class="module-node locked">
                <span class="module-icon">🍎</span>
                <span class="module-label">Módulo 3: Comida</span>
            </div>
            <div class="module-node locked">
                <span class="module-icon">🦋</span>
                <span class="module-label">Módulo 4: Verbos</span>
            </div>
            <div class="module-node locked">
                <span class="module-icon">🏰</span>
                <span class="module-label">Módulo 5: Frases</span>
            </div>
            <!-- More can be added dynamically -->
        </main>

        <!-- Moon Companion Area -->
        <div class="moon-companion" id="moon-trigger">
            <div class="moon-bubble" id="moon-text">
                ¡Hola! Soy Moon. Haz clic en el primer árbol para empezar nuestra aventura.
            </div>
            <!-- Sprite placeholder for Moon -->
            <div style="font-size: 4rem; text-align: center;">🐻‍❄️</div>
        </div>
    </div>

    <script>
        function startModule(id) {
            if (id === 1) {
                alert('¡Cargando Módulo 1! Prepárate para jugar.');
            }
        }

        // Simple interaction for Moon
        const moon = document.getElementById('moon-trigger');
        const phrases = [
            "¿Sabías que 'Forest' significa bosque?",
            "¡Tus pronunciación está mejorando mucho!",
            "¿Listos para el reto de hoy?",
            "Recuerda que puedes agendar con un maestro al terminar el módulo."
        ];

        moon.addEventListener('click', () => {
            const bubble = document.getElementById('moon-text');
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            bubble.innerText = randomPhrase;
            bubble.style.opacity = 1;
            bubble.style.transform = 'translateY(0)';
        });
    </script>
</body>

</html>
